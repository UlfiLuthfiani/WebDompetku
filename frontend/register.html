<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Daftar</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="auth-page">
<div class="auth-wrap">

  <div class="auth-left">
    <div class="leaf leaf-1"></div>
    <div class="leaf leaf-2"></div>
    <div class="leaf leaf-3"></div>
    <div class="brand-box">
      <div class="logo">
        <div class="logo-mark">💰</div>
        <span class="logo-name">Dompetku</span>
      </div>
      <h1 class="auth-headline">Mulai kendalikan<br/>keuanganmu<br/>hari ini.</h1>
      <p class="auth-sub">Daftar sekarang dan mulai catat pemasukan & pengeluaranmu.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="form-card">
      <div class="form-head">
        <h2>Buat akun baru ✨</h2>
      </div>
      <div id="err" class="alert alert-error hidden"></div>
      <div id="ok"  class="alert alert-success hidden"></div>

      <div class="fgroup">
        <label>Nama Lengkap</label>
        <div class="iw"><span class="ico">👤</span>
          <input type="text" id="name" placeholder="Nama kamu" autocomplete="name"/>
        </div>
      </div>
      <div class="fgroup">
        <label>Email</label>
        <div class="iw"><span class="ico">✉️</span>
          <input type="email" id="email" placeholder="kamu@email.com" autocomplete="email"/>
        </div>
      </div>
      <div class="fgroup">
        <label>Password</label>
        <div class="iw"><span class="ico">🔒</span>
          <input type="password" id="pass" placeholder="Min. 6 karakter" autocomplete="new-password"/>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="btn" onclick="doRegister()">Buat Akun</button>
      <p class="form-foot">Sudah punya akun? <a href="index.html" class="link">Masuk</a></p>
    </div>
  </div>

</div>
<script src="api.js"></script>
<script>
  if(localStorage.getItem('accessToken')) location.href='dashboard.html';

  async function doRegister(){
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const pass=document.getElementById('pass').value;
    const err=document.getElementById('err');
    const ok=document.getElementById('ok');
    const btn=document.getElementById('btn');
    err.classList.add('hidden'); ok.classList.add('hidden');
    if(!name||!email||!pass){err.textContent='Isi semua kolom ya.';err.classList.remove('hidden');return;}
    if(pass.length<6){err.textContent='Password minimal 6 karakter.';err.classList.remove('hidden');return;}
    btn.classList.add('loading');btn.textContent='Mendaftar...';
    try{
      const d=await api.register(name,email,pass);
      localStorage.setItem('accessToken',d.accessToken);
      localStorage.setItem('user',JSON.stringify(d.user));
      ok.textContent=`Akun berhasil dibuat! Halo, ${d.user.name}!`;ok.classList.remove('hidden');
      setTimeout(()=>location.href='dashboard.html',1000);
    }catch(e){
      err.textContent=e.message||'Registrasi gagal.';err.classList.remove('hidden');
    }finally{btn.classList.remove('loading');btn.textContent='Buat Akun';}
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
</script>
</body>
</html>
